name: CI

# Runs the same two checks Mehboob already runs manually before every
# deploy (tsc --noEmit + npm run build) automatically on every push and
# pull request, so a broken change gets flagged even if the manual step is
# ever skipped. Does not deploy anything — Vercel deployment is unchanged
# and still happens the same way it already does.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        # These are placeholder values so `next build` has something to read
        # for NEXT_PUBLIC_* — the build only needs the variables to be
        # present as strings, it doesn't connect to Supabase at build time.
        # Real secrets are never needed here and must never be committed;
        # if real values are ever wanted in this workflow, they belong in
        # GitHub → Settings → Secrets, not in this file.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_APP_NAME: Jafson Print ERP
          NODE_ENV: production
        run: npm run build
